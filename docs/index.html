<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>AliPlayerKit - Android 播放器组件</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="AliPlayerKit Android 播放器组件文档 - 低代码播放器 UI 组件与场景化解决方案">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <link rel="icon" href="_media/logo.png" type="image/png">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@latest/lib/themes/vue.css">
    <style>
        /* --- 1. 品牌色配置 --- */
        :root {
            --theme-color: #ff6a00;
            --theme-color-dark: #e55d00;
        }

        /* --- 2. 暗黑模式样式 --- */
        :root {
            --dark-bg: #1a1a1a;
            --dark-text: #c4c4c4;
            --dark-sidebar: #141414;
            --dark-code-bg: #2b2b2b;
            --dark-border: #333;
        }

        body.dark-mode {
            background-color: var(--dark-bg);
            color: var(--dark-text);
        }

        /* 侧边栏适配 */
        body.dark-mode .sidebar {
            background-color: var(--dark-sidebar);
            border-right: 1px solid var(--dark-border);
            color: var(--dark-text);
        }
        body.dark-mode .sidebar-nav li a {
            color: #999;
        }
        body.dark-mode .sidebar-nav li.active > a {
            color: var(--theme-color);
            border-right: 2px solid var(--theme-color);
        }

        /* 代码块适配 */
        body.dark-mode pre {
            background-color: var(--dark-code-bg) !important;
        }
        body.dark-mode code {
            background-color: var(--dark-code-bg) !important;
            color: #e0e0e0 !important;
        }
        body.dark-mode .markdown-section code {
            color: #f08d49;
            background-color: rgba(255,255,255,0.1);
        }

        /* 标题和引用适配 */
        body.dark-mode h1, body.dark-mode h2, body.dark-mode h3, body.dark-mode h4 {
            color: #e0e0e0;
        }
        body.dark-mode blockquote {
            color: #999;
            background: rgba(255,255,255,0.05);
            border-left-color: var(--theme-color);
        }

        /* 表格适配 */
        body.dark-mode .markdown-section tr:nth-child(2n) {
            background-color: rgba(255,255,255,0.03);
        }
        body.dark-mode .markdown-section td,
        body.dark-mode .markdown-section th {
            border-color: var(--dark-border);
        }

        /* Mermaid 图表适配 */
        body.dark-mode .mermaid {
            filter: invert(1) hue-rotate(180deg);
        }

        /* --- 3. 侧边栏开关按钮样式 --- */
        .sidebar-toggle-btn {
            cursor: pointer;
            display: block;
            text-align: center;
            padding: 10px 0;
            margin: 0 15px 10px 15px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 4px;
            background-color: rgba(0,0,0,0.05);
            color: #505d6b;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        body.dark-mode .sidebar-toggle-btn {
            background-color: rgba(255,255,255,0.1);
            color: #ccc;
            border: 1px solid #444;
        }
        .sidebar-toggle-btn:hover {
            background-color: var(--theme-color);
            color: white;
        }
    </style>
</head>

<body>
    <div id="app">加载中...</div>
    <script>
        window.$docsify = {
            name: '<img src="_media/logo.png" alt="AliPlayerKit" width="28" style="vertical-align:middle;margin-right:6px;border-radius:4px;"> AliPlayerKit',
            nameLink: {
                '/': '#/'
            },
            repo: '',
            loadSidebar: true,
            auto2top: true,
            subMaxLevel: 3,
            pagination: {
                previousText: '上一章节',
                nextText: '下一章节',
            },
            count: {
                countable: true,
                fontsize: '0.9em',
                color: 'rgb(90,90,90)',
                language: 'chinese'
            },
            // 搜索配置
            search: {
                maxAge: 86400000,
                paths: 'auto',
                placeholder: '搜索',
                noData: '没有结果',
                depth: 6
            },
            plugins: [
                // 暗黑模式开关插件
                function(hook, vm) {
                    hook.doneEach(function() {
                        const sidebar = document.querySelector('.sidebar-nav');
                        if (!sidebar || document.querySelector('.sidebar-toggle-btn-theme')) return;

                        const btn = document.createElement('div');
                        btn.className = 'sidebar-toggle-btn sidebar-toggle-btn-theme';

                        const savedTheme = localStorage.getItem('theme-mode');
                        if (savedTheme === 'dark') {
                            document.body.classList.add('dark-mode');
                            btn.textContent = '🌙 切换亮色';
                        } else {
                            btn.textContent = '☀️ 切换暗色';
                        }

                        btn.onclick = function() {
                            document.body.classList.toggle('dark-mode');
                            const isDark = document.body.classList.contains('dark-mode');
                            localStorage.setItem('theme-mode', isDark ? 'dark' : 'light');
                            btn.textContent = isDark ? '🌙 切换亮色' : '☀️ 切换暗色';
                        };

                        sidebar.insertBefore(btn, sidebar.firstChild);
                    });
                },
                // 中英文切换插件（含侧边栏动态加载）
                function(hook, vm) {
                    function getCurrentPath() {
                        const path = window.location.hash.replace(/^#\//, '');
                        // 首页 hash 可能是 #/ 或 #/./ 或空
                        if (!path || path === './' || path === '.') return '';
                        return path;
                    }
                    function isEnglishPath(path) {
                        return path.toUpperCase().includes('-EN');
                    }
                    function switchLang() {
                        const currentPath = getCurrentPath();
                        let newPath;
                        if (isEnglishPath(currentPath)) {
                            // 英文 → 中文
                            if (currentPath.toUpperCase().startsWith('README-EN')) {
                                newPath = ''; // docsify 首页 #/ 加载 README.md
                            } else {
                                newPath = currentPath.replace(/-EN\.md$/i, '.md').replace(/-EN$/, '');
                            }
                        } else {
                            // 中文 → 英文
                            if (currentPath.toUpperCase() === 'README.MD' || currentPath.toUpperCase() === 'README' || currentPath === '') {
                                newPath = 'README-EN';
                            } else if (currentPath.toUpperCase() === 'CHANGELOG.MD' || currentPath.toUpperCase() === 'CHANGELOG') {
                                newPath = 'CHANGELOG-EN';
                            } else if (currentPath.endsWith('.md')) {
                                newPath = currentPath.slice(0, -3) + '-EN.md';
                            } else {
                                newPath = currentPath + '-EN';
                            }
                        }
                        window.location.hash = '#/' + newPath;
                    }
                    // 动态加载对应语言的侧边栏
                    function loadSidebar(isEnglish) {
                        const sidebarFile = isEnglish ? '_sidebar-EN.md' : '_sidebar.md';
                        fetch(sidebarFile).then(function(res) {
                            return res.text();
                        }).then(function(md) {
                            const sidebarNav = document.querySelector('.sidebar-nav');
                            if (!sidebarNav) return;
                            // 保留顶部按钮
                            const themeBtn = document.querySelector('.sidebar-toggle-btn-theme');
                            const langBtn = document.querySelector('.sidebar-toggle-btn-lang');
                            // 用 docsify 的 compiler 解析 markdown
                            const html = vm.compiler ? vm.compiler.sidebar(md) : marked(md);
                            sidebarNav.innerHTML = html;
                            // 重新插入按钮（暗黑模式在最上面，语言切换在其下面）
                            if (langBtn) sidebarNav.insertBefore(langBtn, sidebarNav.firstChild);
                            if (themeBtn) sidebarNav.insertBefore(themeBtn, sidebarNav.firstChild);
                            // 高亮当前页面
                            highlightActive();
                        });
                    }
                    // 高亮当前活动链接
                    function highlightActive() {
                        const currentPath = getCurrentPath();
                        const links = document.querySelectorAll('.sidebar-nav a');
                        links.forEach(function(link) {
                            const href = link.getAttribute('href') || '';
                            const linkPath = href.replace(/^#\//, '').replace(/^\.\//,'');
                            link.parentElement.classList.remove('active');
                            if (linkPath && currentPath.includes(linkPath.replace('./', ''))) {
                                link.parentElement.classList.add('active');
                            }
                        });
                    }
                    hook.doneEach(function() {
                        const sidebar = document.querySelector('.sidebar-nav');
                        if (!sidebar) return;

                        // 创建语言切换按钮
                        let langBtn = document.querySelector('.sidebar-toggle-btn-lang');
                        if (!langBtn) {
                            langBtn = document.createElement('div');
                            langBtn.className = 'sidebar-toggle-btn sidebar-toggle-btn-lang';
                            langBtn.onclick = switchLang;
                            // 插入到暗黑模式按钮之后
                            const themeBtn = document.querySelector('.sidebar-toggle-btn-theme');
                            if (themeBtn && themeBtn.nextSibling) {
                                sidebar.insertBefore(langBtn, themeBtn.nextSibling);
                            } else {
                                sidebar.insertBefore(langBtn, sidebar.firstChild);
                            }
                        }
                        // 更新按钮文本
                        const path = getCurrentPath();
                        const isEnglish = isEnglishPath(path);
                        langBtn.textContent = isEnglish ? '🌐 中文' : '🌐 English';
                        // 加载对应语言的侧边栏
                        loadSidebar(isEnglish);
                    });
                }
            ]
        }
    </script>
    <!-- Docsify 核心 -->
    <script src="//cdn.jsdelivr.net/npm/docsify@latest/lib/docsify.min.js"></script>
    <!-- Mermaid 支持 -->
    <script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-mermaid@latest/dist/docsify-mermaid.min.js"></script>
    <!-- 代码高亮 -->
    <script src="//cdn.jsdelivr.net/npm/prismjs@latest/components/prism-bash.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@latest/components/prism-java.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@latest/components/prism-kotlin.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@latest/components/prism-groovy.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@latest/components/prism-xml-doc.js"></script>
    <!-- 分页导航 -->
    <script src="//cdn.jsdelivr.net/npm/docsify-pagination@latest/dist/docsify-pagination.min.js"></script>
    <!-- 代码复制 -->
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code"></script>
    <!-- 图片放大 -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
    <!-- 外部链接 -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/external-script.min.js"></script>
    <!-- 字数统计 -->
    <script src="//unpkg.com/docsify-count/dist/countable.js"></script>
    <!-- 搜索 -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>

</html>
